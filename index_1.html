<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="My Wallet"/>
<meta name="theme-color" content="#0d0d14"/>
<title>My Wallet</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0d0d14;--bg2:#13131f;--bg3:#1a1a2e;--bg4:#20203a;
  --border:#2a2a42;--border2:#3a3a55;
  --gold:#c9a84c;--gold2:#e8c96e;--gold-dim:rgba(201,168,76,.13);
  --green:#3ec97a;--green-dim:rgba(62,201,122,.12);
  --red:#e05c6a;--red-dim:rgba(224,92,106,.12);
  --blue:#5b8dee;--blue-dim:rgba(91,141,238,.12);
  --gray:#7a7a9a;
  --text:#e8e8f5;--text2:#9090b8;--text3:#5a5a7a;
  --radius:16px;--radius-sm:10px;--radius-xs:6px;
  --nav-h:64px;--header-h:56px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{
  font-family:'Cairo',sans-serif;
  background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;
  overscroll-behavior:none;
}

/* ── HEADER ── */
.app-header{
  flex-shrink:0;height:var(--header-h);
  background:rgba(13,13,20,.95);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 1rem;gap:.75rem;
  position:relative;z-index:50;
  padding-top:env(safe-area-inset-top,0);
}
.header-logo{
  font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:900;
  background:linear-gradient(135deg,var(--gold2),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  flex:1;
}
.header-btn{
  width:38px;height:38px;border-radius:var(--radius-sm);
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text2);font-size:1.2rem;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;
}
.header-btn:active{transform:scale(.93);}

/* ── SCROLL AREA ── */
.scroll-area{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding-bottom:calc(var(--nav-h) + var(--safe-bottom) + 1rem);
}

/* ── BOTTOM NAV ── */
.bottom-nav{
  flex-shrink:0;
  position:fixed;bottom:0;left:0;right:0;z-index:50;
  height:calc(var(--nav-h) + var(--safe-bottom));
  padding-bottom:var(--safe-bottom);
  background:rgba(13,13,20,.97);
  backdrop-filter:blur(24px);
  border-top:1px solid var(--border);
  display:flex;align-items:center;
  padding-left:.5rem;padding-right:.5rem;
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  gap:3px;padding:.5rem;cursor:pointer;border-radius:var(--radius-sm);
  transition:all .2s;
}
.nav-item:active{background:var(--bg3);}
.nav-icon{font-size:1.4rem;line-height:1;}
.nav-label{font-size:.65rem;font-weight:600;letter-spacing:.03em;color:var(--text3);transition:color .2s;}
.nav-item.active .nav-label{color:var(--gold2);}
.nav-item.active .nav-icon{filter:drop-shadow(0 0 6px var(--gold));}
.nav-fab{
  flex-shrink:0;width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--gold2),var(--gold));
  display:flex;align-items:center;justify-content:center;
  font-size:1.6rem;color:#0d0d14;font-weight:900;
  cursor:pointer;box-shadow:0 4px 20px rgba(201,168,76,.4);
  transition:all .2s;
}
.nav-fab:active{transform:scale(.92);}

/* ── PAGE ── */
.page{display:none;padding:1rem;}
.page.active{display:block;}

/* ── SECTION TITLE ── */
.sec-title{
  font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;
  color:var(--gold2);border-right:3px solid var(--gold);
  padding-right:.6rem;margin-bottom:.875rem;
}

/* ── STATS STRIP ── */
.stats-strip{
  display:grid;grid-template-columns:1fr 1fr;gap:.625rem;margin-bottom:1.25rem;
}
.stat-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);padding:.875rem 1rem;
}
.stat-label{font-size:.7rem;color:var(--text2);margin-bottom:.2rem;}
.stat-value{font-family:'Playfair Display',serif;font-size:1.3rem;font-weight:700;}
.c-gold{color:var(--gold2);}
.c-green{color:var(--green);}
.c-red{color:var(--red);}
.c-gray{color:var(--gray);}

/* ── WALLET CARD ── */
.wallet-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);padding:1rem 1.125rem;
  margin-bottom:.625rem;position:relative;overflow:hidden;
  transition:all .2s;
}
.wallet-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--gold),transparent);
}
.wallet-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;}
.wallet-name{font-weight:700;font-size:.95rem;}
.badge{font-size:.65rem;padding:.2rem .55rem;border-radius:20px;font-weight:700;letter-spacing:.04em;}
.badge-spend{background:var(--red-dim);color:var(--red);}
.badge-save{background:var(--gold-dim);color:var(--gold2);}
.badge-inc{background:var(--green-dim);color:var(--green);}
.badge-exp{background:var(--red-dim);color:var(--red);}
.wallet-balance{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:700;margin-bottom:.2rem;}
.wallet-sub{font-size:.75rem;color:var(--text2);}
.wallet-sub span{font-weight:700;}
.prog-bar{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:.75rem;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:2px;}

/* ── TRANSACTION LIST ── */
.tx-list{margin-bottom:1.25rem;}
.tx-item{
  display:flex;align-items:center;gap:.75rem;
  padding:.75rem .875rem;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius-sm);margin-bottom:.375rem;
}
.tx-icon{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:1rem;
}
.tx-icon-income{background:var(--green-dim);}
.tx-icon-expense{background:var(--red-dim);}
.tx-icon-transfer{background:var(--blue-dim);}
.tx-info{flex:1;min-width:0;}
.tx-name{font-size:.88rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tx-meta{font-size:.72rem;color:var(--text2);}
.tx-amount{font-weight:700;font-size:.9rem;white-space:nowrap;}
.amt-pos{color:var(--green);}
.amt-neg{color:var(--red);}
.amt-neu{color:var(--gray);}

/* ── CAT CARD ── */
.cat-card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);padding:.875rem 1rem;
  margin-bottom:.625rem;
}
.cat-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:.625rem;}
.cat-nums{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:.625rem;}
.cat-num{background:var(--bg3);border-radius:var(--radius-xs);padding:.45rem .625rem;}
.cat-num-label{font-size:.65rem;color:var(--text2);}
.cat-num-val{font-size:.88rem;font-weight:700;}

/* ── EMPTY ── */
.empty{
  text-align:center;padding:2rem 1rem;
  color:var(--text3);font-size:.85rem;
}
.empty-icon{font-size:2.5rem;margin-bottom:.5rem;}

/* ── MONTH GROUP ── */
.month-group{margin-bottom:1.25rem;}
.month-label{
  font-size:.75rem;font-weight:700;letter-spacing:.08em;
  color:var(--text2);text-transform:uppercase;
  border-bottom:1px solid var(--border);
  padding-bottom:.4rem;margin-bottom:.625rem;
}

/* ── MODAL / SHEET ── */
.sheet-overlay{
  display:none;position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.65);backdrop-filter:blur(4px);
}
.sheet-overlay.open{display:flex;align-items:flex-end;}
.sheet{
  width:100%;max-height:90vh;overflow-y:auto;
  background:var(--bg2);
  border-radius:calc(var(--radius)*1.25) calc(var(--radius)*1.25) 0 0;
  border-top:1px solid var(--border);
  padding:1.25rem 1rem calc(1.5rem + var(--safe-bottom));
  animation:slideUp .3s cubic-bezier(.4,0,.2,1);
}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:none;}}
.sheet-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto .875rem;}
.sheet-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--gold2);margin-bottom:1rem;}
.form-group{margin-bottom:.875rem;}
.form-label{display:block;font-size:.78rem;color:var(--text2);font-weight:600;margin-bottom:.35rem;}
.form-input{
  width:100%;background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:.65rem .875rem;
  color:var(--text);font-family:'Cairo',sans-serif;font-size:.95rem;
  outline:none;transition:border-color .2s;appearance:none;
}
.form-input:focus{border-color:var(--gold);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:.625rem;}
.form-actions{display:flex;gap:.625rem;margin-top:1rem;}
.btn{
  flex:1;padding:.7rem;border-radius:var(--radius-sm);
  font-family:'Cairo',sans-serif;font-size:.9rem;font-weight:700;
  cursor:pointer;border:none;transition:all .2s;
}
.btn:active{transform:scale(.97);}
.btn-gold{background:linear-gradient(135deg,var(--gold2),var(--gold));color:#0d0d14;}
.btn-cancel{background:var(--bg3);color:var(--text2);border:1px solid var(--border);}
.btn-green{background:var(--green-dim);color:var(--green);border:1px solid var(--green);}
.btn-red{background:var(--red-dim);color:var(--red);border:1px solid var(--red);}

/* ── TOAST ── */
.toast{
  position:fixed;top:calc(var(--header-h) + .75rem);left:1rem;right:1rem;z-index:300;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:.75rem 1rem;
  color:var(--text);font-size:.88rem;text-align:center;
  transform:translateY(-80px);opacity:0;
  transition:all .3s cubic-bezier(.4,0,.2,1);
  pointer-events:none;
}
.toast.show{transform:none;opacity:1;}
.toast.ok{border-color:var(--green);color:var(--green);}
.toast.err{border-color:var(--red);color:var(--red);}

/* ── LOADER ── */
#app-loader{
  position:fixed;inset:0;background:var(--bg);z-index:999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;
}
.loader-logo{font-family:'Playfair Display',serif;font-size:2.5rem;font-weight:900;background:linear-gradient(135deg,var(--gold2),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.loader-bar{width:160px;height:2px;background:var(--border);border-radius:1px;overflow:hidden;}
.loader-fill{width:0;height:100%;background:var(--gold);animation:loadbar 1s ease forwards;}
@keyframes loadbar{to{width:100%;}}
.loader-sub{font-size:.8rem;color:var(--text2);}

/* ── SECTION TOGGLE ── */
.sec-toggle{
  display:flex;gap:.4rem;margin-bottom:.875rem;overflow-x:auto;
  padding-bottom:.2rem;scrollbar-width:none;
}
.sec-toggle::-webkit-scrollbar{display:none;}
.tog-btn{
  flex-shrink:0;padding:.35rem .85rem;border-radius:20px;
  font-size:.78rem;font-weight:700;
  background:var(--bg3);border:1px solid var(--border);color:var(--text2);
  cursor:pointer;transition:all .2s;white-space:nowrap;
}
.tog-btn.active{background:var(--gold-dim);border-color:var(--gold);color:var(--gold2);}

/* ── FAB speed-dial ── */
.speed-dial{
  position:fixed;bottom:calc(var(--nav-h) + var(--safe-bottom) + .75rem);
  left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:.5rem;
  z-index:40;
  transition:all .25s;
  pointer-events:none;opacity:0;
}
.speed-dial.open{opacity:1;pointer-events:auto;}
.speed-dial-item{
  display:flex;align-items:center;gap:.625rem;
}
.sd-btn{
  width:44px;height:44px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;cursor:pointer;border:1px solid var(--border);
  transition:all .2s;
}
.sd-btn:active{transform:scale(.9);}
.sd-label{font-size:.78rem;font-weight:700;color:var(--text);background:var(--bg3);
  padding:.2rem .6rem;border-radius:var(--radius-xs);border:1px solid var(--border);}
.sd-green{background:var(--green-dim);border-color:var(--green);}
.sd-red{background:var(--red-dim);border-color:var(--red);}
.sd-blue{background:var(--blue-dim);border-color:var(--blue);}
.sd-gold{background:var(--gold-dim);border-color:var(--gold);}
</style>
</head>
<body>

<!-- LOADER -->
<div id="app-loader">
  <div class="loader-logo">My Wallet</div>
  <div class="loader-bar"><div class="loader-fill"></div></div>
  <div class="loader-sub">جاري التحميل…</div>
</div>

<!-- HEADER -->
<div class="app-header">
  <div class="header-logo">My Wallet 💰</div>
  <div class="header-btn" onclick="openSheet('sheet-cat')" title="فئة جديدة">🏷</div>
</div>

<!-- SCROLL AREA -->
<div class="scroll-area" id="scroll-area">

  <!-- PAGE: DASHBOARD -->
  <div class="page active" id="page-home">
    <div class="stats-strip" id="home-stats"></div>
    <div class="sec-title">محافظي</div>
    <div id="home-wallets"></div>
    <div class="sec-title" id="home-month-title">هذا الشهر</div>
    <div id="home-txs" class="tx-list"></div>
    <div class="sec-title">الفئات</div>
    <div id="home-cats"></div>
  </div>

  <!-- PAGE: SPENDING -->
  <div class="page" id="page-spend">
    <div class="sec-toggle">
      <div class="tog-btn active" onclick="spendTab(this,'up')">📅 قادمة</div>
      <div class="tog-btn" onclick="spendTab(this,'month')">هذا الشهر</div>
      <div class="tog-btn" onclick="spendTab(this,'hist')">السجل</div>
      <div class="tog-btn" onclick="spendTab(this,'unsort')">⚠️ غير مصنف</div>
    </div>
    <div id="spend-up"></div>
    <div id="spend-month" style="display:none"></div>
    <div id="spend-hist" style="display:none"></div>
    <div id="spend-unsort" style="display:none"></div>
  </div>

  <!-- PAGE: WALLETS -->
  <div class="page" id="page-wallets">
    <div class="sec-title">جميع المحافظ</div>
    <div id="wallets-list"></div>
    <div class="sec-title" style="margin-top:.5rem">🎯 المدخرات</div>
    <div id="savings-list"></div>
  </div>

</div><!-- /scroll-area -->

<!-- SPEED DIAL -->
<div class="speed-dial" id="speed-dial">
  <div class="speed-dial-item"><div class="sd-btn sd-gold" onclick="openSheet('sheet-wallet')">👛</div><div class="sd-label">محفظة</div></div>
  <div class="speed-dial-item"><div class="sd-btn sd-blue" onclick="openSheet('sheet-transfer')">⇄</div><div class="sd-label">تحويل</div></div>
  <div class="speed-dial-item"><div class="sd-btn sd-red" onclick="openSheet('sheet-expense')">💸</div><div class="sd-label">مصروف</div></div>
  <div class="speed-dial-item"><div class="sd-btn sd-green" onclick="openSheet('sheet-income')">💰</div><div class="sd-label">دخل</div></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-item active" id="nav-home" onclick="showPage('home',this)">
    <div class="nav-icon">🏠</div><div class="nav-label">الرئيسية</div>
  </div>
  <div class="nav-item" id="nav-spend" onclick="showPage('spend',this)">
    <div class="nav-icon">💸</div><div class="nav-label">المصروفات</div>
  </div>
  <div class="nav-fab" id="fab" onclick="toggleDial()">＋</div>
  <div class="nav-item" id="nav-wallets" onclick="showPage('wallets',this)">
    <div class="nav-icon">👛</div><div class="nav-label">المحافظ</div>
  </div>
  <div class="nav-item" onclick="showPage('home',document.getElementById('nav-home'));location.reload()">
    <div class="nav-icon">🔄</div><div class="nav-label">تحديث</div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ════════ SHEETS (bottom modals) ════════ -->

<!-- EXPENSE -->
<div class="sheet-overlay" id="sheet-expense" onclick="if(event.target===this)closeSheet(this)">
<div class="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">💸 إضافة مصروف</div>
  <div class="form-group"><label class="form-label">الاسم *</label><input class="form-input" id="e-name" type="text" placeholder="مثال: فاتورة كهرباء"/></div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">المبلغ *</label><input class="form-input" id="e-amount" type="number" inputmode="decimal" placeholder="0.00" step="0.01"/></div>
    <div class="form-group"><label class="form-label">التاريخ *</label><input class="form-input" id="e-date" type="date"/></div>
  </div>
  <div class="form-group"><label class="form-label">المحفظة</label>
    <select class="form-input" id="e-wallet"><option value="">— اختر —</option></select>
  </div>
  <div class="form-group"><label class="form-label">الفئة</label>
    <select class="form-input" id="e-cat"><option value="">— اختر —</option></select>
  </div>
  <div class="form-actions">
    <button class="btn btn-cancel" onclick="closeSheet(document.getElementById('sheet-expense'))">إلغاء</button>
    <button class="btn btn-red" onclick="saveExpense()">حفظ ↓</button>
  </div>
</div></div>

<!-- INCOME -->
<div class="sheet-overlay" id="sheet-income" onclick="if(event.target===this)closeSheet(this)">
<div class="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">💰 إضافة دخل</div>
  <div class="form-group"><label class="form-label">الاسم *</label><input class="form-input" id="i-name" type="text" placeholder="مثال: راتب شهر مايو"/></div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">المبلغ *</label><input class="form-input" id="i-amount" type="number" inputmode="decimal" placeholder="0.00" step="0.01"/></div>
    <div class="form-group"><label class="form-label">التاريخ *</label><input class="form-input" id="i-date" type="date"/></div>
  </div>
  <div class="form-group"><label class="form-label">المحفظة</label>
    <select class="form-input" id="i-wallet"><option value="">— اختر —</option></select>
  </div>
  <div class="form-group"><label class="form-label">الفئة</label>
    <select class="form-input" id="i-cat"><option value="">— اختر —</option></select>
  </div>
  <div class="form-group"><label class="form-label">ملاحظات</label><input class="form-input" id="i-notes" type="text" placeholder="اختياري…"/></div>
  <div class="form-actions">
    <button class="btn btn-cancel" onclick="closeSheet(document.getElementById('sheet-income'))">إلغاء</button>
    <button class="btn btn-green" onclick="saveIncome()">حفظ ↑</button>
  </div>
</div></div>

<!-- TRANSFER -->
<div class="sheet-overlay" id="sheet-transfer" onclick="if(event.target===this)closeSheet(this)">
<div class="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title">⇄ تحويل بين المحافظ</div>
  <div class="form-group"><label class="form-label">الوصف *</label><input class="form-input" id="t-name" type="text" placeholder="مثال: تحويل للمدخرات"/></div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">المبلغ *</label><input class="form-input" id="t-amount" type="number" inputmode="decimal" placeholder="0.00" step="0.01"/></div>
    <div class="form-group"><label class="form-label">التاريخ *</label><input class="form-input" id="t-date" type="date"/></div>
  </div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">من</label>
      <select class="form-input" id="t-from"><option value="">— اختر —</option></select>
    </div>
    <div class="form-group"><label class="form-label">إلى</label>
      <select class="form-input" id="t-to"><option value="">— اختر —</option></select>
    </div>
  </div>
  <div class="form-actions">
    <button class="btn btn-cancel" onclick="closeSheet(document.getElementById('sheet-transfer'))">إلغاء</button>
    <button class="btn btn-gold" onclick="saveTransfer()">تحويل ⇄</button>
  </div>
</div></div>

<!-- WALLET -->

<div class="sheet-overlay" id="sheet-cat" onclick="if(event.target===this)closeSheet(this)">
<div class="sheet">
  <div class="sheet-handle"></div>

  <div class="form-group"><label class="form-label">اسم الفئة *</label><input class="form-input" id="c-name" type="text" placeholder="مثال: مطاعم، راتب…"/></div>
  <div class="form-row">
    <div class="form-group"><label class="form-label">النوع</label>
      <select class="form-input" id="c-type">
        <option value="Expense">مصروف</option>
        <option value="Income">دخل</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">الميزانية</label><input class="form-input" id="c-budget" type="number" inputmode="decimal" placeholder="0.00" step="0.01"/></div>
  </div>
  <div class="form-actions">
    <button class="btn btn-cancel" onclick="closeSheet(document.getElementById('sheet-cat'))">إلغاء</button>
    <button class="btn btn-gold" onclick="saveCat()">إضافة</button>

<script>
// ═══════════════════════════════════════════════════
// DATABASE — IndexedDB
// ═══════════════════════════════════════════════════
var DB, DB_NAME='mywallet', DB_VER=1;
var STORES=['wallets','expenses','incomes','transfers','categories'];

function initDB(){
  return new Promise(function(res,rej){
    var req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=function(e){
      var db=e.target.result;
      STORES.forEach(function(s){
        if(!db.objectStoreNames.contains(s))
          db.createObjectStore(s,{keyPath:'id'});
      });
    };
    req.onsuccess=function(e){DB=e.target.result;res();};
    req.onerror=function(e){rej(e);};
  });
}

function dbGetAll(store){
  return new Promise(function(res,rej){
    var tx=DB.transaction(store,'readonly');
    var req=tx.objectStore(store).getAll();
    req.onsuccess=function(){res(req.result);};
    req.onerror=rej;
  });
}

function dbPut(store,obj){
  return new Promise(function(res,rej){
    var tx=DB.transaction(store,'readwrite');
    var req=tx.objectStore(store).put(obj);
    req.onsuccess=res;req.onerror=rej;
  });
}

function uid(){
  return Date.now().toString(36)+Math.random().toString(36).slice(2);
}

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
var S={wallets:[],expenses:[],incomes:[],transfers:[],categories:[]};

function loadAll(){
  return Promise.all(STORES.map(function(s){
    return dbGetAll(s).then(function(rows){S[s]=rows;});
  }));
}

// ═══════════════════════════════════════════════════
// CALCULATIONS
// ═══════════════════════════════════════════════════
function calcWallet(w){
  var id=w.id;
  var totalIncome=S.incomes.filter(function(x){return x.wallet_id===id;}).reduce(function(a,x){return a+Number(x.amount||0);},0);
  var totalExpense=S.expenses.filter(function(x){return x.wallet_id===id;}).reduce(function(a,x){return a+Number(x.amount||0);},0);
  var inTr=S.transfers.filter(function(x){return x.to_wallet_id===id;}).reduce(function(a,x){return a+Number(x.amount||0);},0);
  var outTr=S.transfers.filter(function(x){return x.from_wallet_id===id;}).reduce(function(a,x){return a+Number(x.amount||0);},0);
  var balance=totalIncome-totalExpense+inTr-outTr;
  var now=new Date(); var cy=now.getFullYear(); var cm=now.getMonth();
  var mInc=S.incomes.filter(function(x){return x.wallet_id===id&&isCurMonth(x.payment_date,cy,cm);}).reduce(function(a,x){return a+Number(x.amount||0);},0);
  var mExp=S.expenses.filter(function(x){return x.wallet_id===id&&isCurMonth(x.payment_date,cy,cm);}).reduce(function(a,x){return a+Number(x.amount||0);},0);
  var progress=w.type==='Saving'&&Number(w.goal_amount)>0?(balance/Number(w.goal_amount))*100:0;
  return Object.assign({},w,{balance:balance,mInc:mInc,mExp:mExp,cashflow:mInc-mExp,progress:Math.min(progress,100),totalIncome:totalIncome,totalExpense:totalExpense});
}

function calcCat(c){
  var id=c.id;
  var exps=S.expenses.filter(function(x){return x.category_id===id;});
  var incs=S.incomes.filter(function(x){return x.category_id===id;});
  var totalSpend=exps.reduce(function(a,x){return a+Number(x.amount||0);},0);
  var totalInc=incs.reduce(function(a,x){return a+Number(x.amount||0);},0);
  var budget=Number(c.budget||0);
  var moneyLeft=budget-totalSpend;
  var budgetPct=budget>0?Math.min((totalSpend/budget)*100,100):0;
  return Object.assign({},c,{totalSpend:totalSpend,totalInc:totalInc,moneyLeft:moneyLeft,budgetPct:budgetPct});
}

function isCurMonth(d,y,m){
  if(!d)return false;
  var dt=new Date(d);return dt.getFullYear()===y&&dt.getMonth()===m;
}

// ═══════════════════════════════════════════════════
// FORMAT
// ═══════════════════════════════════════════════════
function fmt(n){return Number(n||0).toLocaleString('ar-EG',{minimumFractionDigits:0,maximumFractionDigits:2});}
function fmtDate(d){
  if(!d)return'—';
  var dt=new Date(d);if(isNaN(dt))return String(d).slice(0,10);
  return dt.toLocaleDateString('ar-EG',{month:'short',day:'numeric'});
}
function walletName(id){var w=S.wallets.find(function(x){return x.id===id;});return w?w.name:'—';}
function catName(id){var c=S.categories.find(function(x){return x.id===id;});return c?c.name:'—';}

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════
function render(){
  populateSelects();
  renderHome();
  renderSpend();
  renderWallets();
}

function populateSelects(){
  var wOpts=S.wallets.map(function(w){return '<option value="'+w.id+'">'+w.name+'</option>';}).join('');
  ['e-wallet','i-wallet','t-from','t-to'].forEach(function(id){
    var el=document.getElementById(id);if(!el)return;
    el.innerHTML='<option value="">— اختر —</option>'+wOpts;
  });
  var expCats=S.categories.filter(function(c){return c.type==='Expense';}).map(function(c){return '<option value="'+c.id+'">'+c.name+'</option>';}).join('');
  var incCats=S.categories.filter(function(c){return c.type==='Income';}).map(function(c){return '<option value="'+c.id+'">'+c.name+'</option>';}).join('');
  var ec=document.getElementById('e-cat');if(ec)ec.innerHTML='<option value="">— اختر —</option>'+expCats;
  var ic=document.getElementById('i-cat');if(ic)ic.innerHTML='<option value="">— اختر —</option>'+incCats;
}

// — HOME —
function renderHome(){
  var now=new Date(); var cy=now.getFullYear(); var cm=now.getMonth();
  var wCalc=S.wallets.map(calcWallet);
  var totalBal=wCalc.reduce(function(a,w){return a+w.balance;},0);
  var mInc=wCalc.reduce(function(a,w){return a+w.mInc;},0);
  var mExp=wCalc.reduce(function(a,w){return a+w.mExp;},0);
  var net=mInc-mExp;

  document.getElementById('home-stats').innerHTML=
    '<div class="stat-card"><div class="stat-label">إجمالي الأرصدة</div><div class="stat-value c-gold">'+fmt(totalBal)+' ج</div></div>'+
    '<div class="stat-card"><div class="stat-label">صافي الشهر</div><div class="stat-value '+(net>=0?'c-green':'c-red')+'">'+(net>=0?'+':'')+fmt(net)+' ج</div></div>'+
    '<div class="stat-card"><div class="stat-label">دخل الشهر</div><div class="stat-value c-green">+'+fmt(mInc)+' ج</div></div>'+
    '<div class="stat-card"><div class="stat-label">مصروف الشهر</div><div class="stat-value c-red">-'+fmt(mExp)+' ج</div></div>';

  // wallets
  if(!wCalc.length){
    document.getElementById('home-wallets').innerHTML='<div class="empty"><div class="empty-icon">👛</div>لا توجد محافظ. اضغط + لإضافة أول محفظة!</div>';
  } else {
    document.getElementById('home-wallets').innerHTML=wCalc.map(function(w){
      var cf=w.cashflow; var cfC=cf>=0?'c-green':'c-red';
      var prog=w.type==='Saving'?'<div class="prog-bar"><div class="prog-fill" style="width:'+w.progress.toFixed(1)+'%"></div></div><div style="font-size:.68rem;color:var(--text2);margin-top:.3rem">'+w.progress.toFixed(0)+'% من الهدف ('+fmt(w.goal_amount)+' ج)</div>':'';
      return '<div class="wallet-card"><div class="wallet-card-top"><span class="wallet-name">'+w.name+'</span><span class="badge '+(w.type==='Saving'?'badge-save':'badge-spend')+'">'+w.type+'</span></div><div class="wallet-balance">'+fmt(w.balance)+' <span style="font-size:.9rem;color:var(--text2)">ج</span></div><div class="wallet-sub">Cash Flow: <span class="'+cfC+'">'+(cf>=0?'+':'')+fmt(cf)+' ج</span></div>'+prog+'</div>';
    }).join('');
  }

  // this month txs
  var txs=[];
  S.incomes.filter(function(x){return isCurMonth(x.payment_date,cy,cm);}).forEach(function(x){txs.push({type:'income',name:x.name,amount:x.amount,date:x.payment_date,wallet:walletName(x.wallet_id),cat:catName(x.category_id)});});
  S.expenses.filter(function(x){return isCurMonth(x.payment_date,cy,cm);}).forEach(function(x){txs.push({type:'expense',name:x.name,amount:x.amount,date:x.payment_date,wallet:walletName(x.wallet_id),cat:catName(x.category_id)});});
  S.transfers.filter(function(x){return isCurMonth(x.transfer_date,cy,cm);}).forEach(function(x){txs.push({type:'transfer',name:x.name,amount:x.amount,date:x.transfer_date,wallet:walletName(x.from_wallet_id)+'→'+walletName(x.to_wallet_id),cat:'تحويل'});});
  txs.sort(function(a,b){return new Date(b.date)-new Date(a.date);});
  var mo=String(cm+1).padStart(2,'0')+'/'+cy;
  document.getElementById('home-month-title').textContent='هذا الشهر — '+mo;
  document.getElementById('home-txs').innerHTML=txs.length?txs.map(txRow).join(''):'<div class="empty"><div class="empty-icon">📭</div>لا توجد حركات هذا الشهر</div>';

  // cats
  var cCalc=S.categories.map(calcCat);
  document.getElementById('home-cats').innerHTML=cCalc.length?cCalc.map(function(c){
    var avgVal=c.type==='Income'?c.totalInc:c.totalSpend;
    return '<div class="cat-card"><div class="cat-top"><span style="font-weight:700">'+c.name+'</span><span class="badge '+(c.type==='Income'?'badge-inc':'badge-exp')+'">'+c.type+'</span></div><div class="cat-nums"><div class="cat-num"><div class="cat-num-label">إجمالي</div><div class="cat-num-val">'+fmt(avgVal)+' ج</div></div><div class="cat-num"><div class="cat-num-label">متبقي</div><div class="cat-num-val '+(c.moneyLeft>=0?'c-green':'c-red')+'">'+fmt(c.moneyLeft)+' ج</div></div></div><div class="prog-bar"><div class="prog-fill" style="width:'+c.budgetPct.toFixed(0)+'%;background:linear-gradient(90deg,var(--red),#ff9fa6)"></div></div><div style="font-size:.68rem;color:var(--text2);margin-top:.25rem">'+c.budgetPct.toFixed(0)+'% من الميزانية ('+fmt(c.budget)+' ج)</div></div>';
  }).join(''):'<div class="empty"><div class="empty-icon">🏷</div>لا توجد فئات. اضغط 🏷 في الأعلى!</div>';
}

function txRow(r){
  var icon=r.type==='income'?'💰':r.type==='expense'?'💸':'⇄';
  var cls=r.type==='income'?'tx-icon-income':r.type==='expense'?'tx-icon-expense':'tx-icon-transfer';
  var amtC=r.type==='income'?'amt-pos':r.type==='expense'?'amt-neg':'amt-neu';
  var prefix=r.type==='income'?'+':r.type==='expense'?'-':'';
  return '<div class="tx-item"><div class="tx-icon '+cls+'">'+icon+'</div><div class="tx-info"><div class="tx-name">'+r.name+'</div><div class="tx-meta">'+fmtDate(r.date)+' · '+r.cat+'</div></div><div class="tx-amount '+amtC+'">'+prefix+fmt(r.amount)+'</div></div>';
}

// — SPENDING —
var curSpendTab='up';
function spendTab(el,tab){
  document.querySelectorAll('.tog-btn').forEach(function(b){b.classList.remove('active');});
  el.classList.add('active');
  ['up','month','hist','unsort'].forEach(function(t){
    document.getElementById('spend-'+t).style.display=t===tab?'':'none';
  });
  curSpendTab=tab;
}

function renderSpend(){
  var now=new Date(); var cy=now.getFullYear(); var cm=now.getMonth();
  var today=new Date(); today.setHours(0,0,0,0);

  // upcoming
  var upcoming=S.expenses.filter(function(x){var d=new Date(x.payment_date);d.setHours(0,0,0,0);return d>today;}).sort(function(a,b){return new Date(a.payment_date)-new Date(b.payment_date);});
  document.getElementById('spend-up').innerHTML=upcoming.length?upcoming.map(function(e){return txRow({type:'expense',name:e.name,amount:e.amount,date:e.payment_date,cat:catName(e.category_id)});}).join(''):'<div class="empty"><div class="empty-icon">✅</div>لا توجد مدفوعات قادمة</div>';

  // this month
  var mExp=S.expenses.filter(function(x){return isCurMonth(x.payment_date,cy,cm);}).sort(function(a,b){return new Date(b.payment_date)-new Date(a.payment_date);});
  document.getElementById('spend-month').innerHTML=mExp.length?mExp.map(function(e){return txRow({type:'expense',name:e.name,amount:e.amount,date:e.payment_date,cat:catName(e.category_id)});}).join(''):'<div class="empty"><div class="empty-icon">📭</div>لا توجد مصروفات هذا الشهر</div>';

  // unsorted
  var unsort=S.expenses.filter(function(x){return !x.category_id||!x.wallet_id;});
  document.getElementById('spend-unsort').innerHTML=unsort.length?unsort.map(function(e){return txRow({type:'expense',name:'⚠️ '+e.name,amount:e.amount,date:e.payment_date,cat:catName(e.category_id)||'—'});}).join(''):'<div class="empty"><div class="empty-icon">👍</div>كل المصروفات مصنفة!</div>';

  // history
  var hMap={};
  S.expenses.forEach(function(e){
    var dt=new Date(e.payment_date);if(isNaN(dt))return;
    var k=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0');
    if(!hMap[k])hMap[k]=[];
    hMap[k].push(e);
  });
  var keys=Object.keys(hMap).sort().reverse();
  document.getElementById('spend-hist').innerHTML=keys.length?keys.map(function(k){
    var rows=hMap[k].sort(function(a,b){return new Date(b.payment_date)-new Date(a.payment_date);});
    var total=rows.reduce(function(a,x){return a+Number(x.amount||0);},0);
    return '<div class="month-group"><div class="month-label">'+k+' · إجمالي: '+fmt(total)+' ج</div>'+rows.map(function(e){return txRow({type:'expense',name:e.name,amount:e.amount,date:e.payment_date,cat:catName(e.category_id)});}).join('')+'</div>';
  }).join(''):'<div class="empty"><div class="empty-icon">📚</div>لا يوجد سجل بعد</div>';
}

// — WALLETS —
function renderWallets(){
  var wCalc=S.wallets.map(calcWallet);
  document.getElementById('wallets-list').innerHTML=wCalc.length?wCalc.map(function(w){
    var balC=w.balance>=0?'c-green':'c-red';
    var cfC=w.cashflow>=0?'c-green':'c-red';
    return '<div class="wallet-card"><div class="wallet-card-top"><span class="wallet-name">'+w.name+'</span><span class="badge '+(w.type==='Saving'?'badge-save':'badge-spend')+'">'+w.type+'</span></div><div class="wallet-balance '+balC+'">'+fmt(w.balance)+' ج</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:.4rem;margin-top:.6rem"><div class="cat-num"><div class="cat-num-label">دخل</div><div class="cat-num-val c-green">+'+fmt(w.totalIncome)+'</div></div><div class="cat-num"><div class="cat-num-label">مصروف</div><div class="cat-num-val c-red">-'+fmt(w.totalExpense)+'</div></div><div class="cat-num"><div class="cat-num-label">Cash Flow</div><div class="cat-num-val '+cfC+'">'+(w.cashflow>=0?'+':'')+fmt(w.cashflow)+'</div></div></div></div>';
  }).join(''):'<div class="empty"><div class="empty-icon">👛</div>لا توجد محافظ</div>';

  var savings=wCalc.filter(function(w){return w.type==='Saving';});
  document.getElementById('savings-list').innerHTML=savings.length?savings.map(function(w){
    var prog=w.progress.toFixed(0);
    return '<div class="wallet-card"><div class="wallet-card-top"><span class="wallet-name">🎯 '+w.name+'</span><span class="badge badge-save">Saving</span></div><div class="wallet-balance">'+fmt(w.balance)+' ج</div><div class="wallet-sub">الهدف: <span style="color:var(--gold2)">'+fmt(w.goal_amount)+' ج</span></div><div class="prog-bar" style="margin-top:.75rem"><div class="prog-fill" style="width:'+prog+'%"></div></div><div style="font-size:.7rem;color:var(--text2);margin-top:.3rem">'+prog+'% مكتمل</div></div>';
  }).join(''):'<div class="empty"><div class="empty-icon">🎯</div>لا توجد محافظ ادخارية</div>';
}

// ═══════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════
function showPage(id,navEl){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});
  document.getElementById('page-'+id).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(function(n){n.classList.remove('active');});
  if(navEl)navEl.classList.add('active');
  document.getElementById('scroll-area').scrollTop=0;
  closeDial();
}

// ═══════════════════════════════════════════════════
// SPEED DIAL
// ═══════════════════════════════════════════════════
var dialOpen=false;
function toggleDial(){
  dialOpen=!dialOpen;
  var fab=document.getElementById('fab');
  var sd=document.getElementById('speed-dial');
  fab.textContent=dialOpen?'✕':'＋';
  sd.classList.toggle('open',dialOpen);
}
function closeDial(){
  dialOpen=false;
  document.getElementById('fab').textContent='＋';
  document.getElementById('speed-dial').classList.remove('open');
}

// ═══════════════════════════════════════════════════
// SHEET MODAL
// ═══════════════════════════════════════════════════
function openSheet(id){
  closeDial();
  document.getElementById(id).classList.add('open');
}
function closeSheet(el){el.classList.remove('open');}

// ═══════════════════════════════════════════════════
// SAVE FUNCTIONS
// ═══════════════════════════════════════════════════
function saveExpense(){
  var name=v('e-name'),amount=v('e-amount'),date=v('e-date'),wallet=v('e-wallet'),cat=v('e-cat');
  if(!name||!amount||!date){toast('يرجى ملء الاسم والمبلغ والتاريخ','err');return;}
  dbPut('expenses',{id:uid(),name:name,amount:Number(amount),payment_date:date,wallet_id:wallet,category_id:cat}).then(function(){
    closeSheet(document.getElementById('sheet-expense'));
    clear(['e-name','e-amount']);
    toast('✅ تم حفظ المصروف');
    return loadAll().then(render);
  }).catch(function(e){toast('خطأ: '+e,'err');});
}

function saveIncome(){
  var name=v('i-name'),amount=v('i-amount'),date=v('i-date'),wallet=v('i-wallet'),cat=v('i-cat'),notes=v('i-notes');
  if(!name||!amount||!date){toast('يرجى ملء الاسم والمبلغ والتاريخ','err');return;}
  dbPut('incomes',{id:uid(),name:name,amount:Number(amount),payment_date:date,wallet_id:wallet,category_id:cat,notes:notes}).then(function(){
    closeSheet(document.getElementById('sheet-income'));
    clear(['i-name','i-amount','i-notes']);
    toast('✅ تم حفظ الدخل');
    return loadAll().then(render);
  }).catch(function(e){toast('خطأ: '+e,'err');});
}

function saveTransfer(){
  var name=v('t-name'),amount=v('t-amount'),date=v('t-date'),from=v('t-from'),to=v('t-to');
  if(!name||!amount||!date||!from||!to){toast('يرجى ملء جميع الحقول','err');return;}
  if(from===to){toast('لا يمكن التحويل لنفس المحفظة','err');return;}
  dbPut('transfers',{id:uid(),name:name,amount:Number(amount),transfer_date:date,from_wallet_id:from,to_wallet_id:to}).then(function(){
    closeSheet(document.getElementById('sheet-transfer'));
    clear(['t-name','t-amount']);
    toast('✅ تم التحويل');
    return loadAll().then(render);
  }).catch(function(e){toast('خطأ: '+e,'err');});
}

function saveWallet(){
  var name=v('w-name'),type=v('w-type'),goal=v('w-goal');
  if(!name){toast('يرجى إدخال اسم المحفظة','err');return;}
  dbPut('wallets',{id:uid(),name:name,type:type,goal_amount:Number(goal||0)}).then(function(){
    closeSheet(document.getElementById('sheet-wallet'));
    clear(['w-name','w-goal']);
    toast('✅ تم إضافة المحفظة');
    return loadAll().then(render);
  }).catch(function(e){toast('خطأ: '+e,'err');});
}

function saveCat(){
  var name=v('c-name'),type=v('c-type'),budget=v('c-budget');
  if(!name){toast('يرجى إدخال اسم الفئة','err');return;}
  dbPut('categories',{id:uid(),name:name,type:type,budget:Number(budget||0)}).then(function(){
    closeSheet(document.getElementById('sheet-cat'));
    clear(['c-name','c-budget']);
    toast('✅ تم إضافة الفئة');
    return loadAll().then(render);
  }).catch(function(e){toast('خطأ: '+e,'err');});
}

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
function v(id){return document.getElementById(id).value.trim();}
function clear(ids){ids.forEach(function(id){document.getElementById(id).value='';});}

var toastTmr;
function toast(msg,type){
  clearTimeout(toastTmr);
  var el=document.getElementById('toast');
  el.textContent=msg;el.className='toast '+(type==='err'?'err':'ok');
  el.classList.add('show');
  toastTmr=setTimeout(function(){el.classList.remove('show');},2800);
}

function setTodayDates(){
  var t=new Date().toISOString().split('T')[0];
  ['e-date','i-date','t-date'].forEach(function(id){var el=document.getElementById(id);if(el)el.value=t;});
}

// close dial on scroll
document.getElementById('scroll-area').addEventListener('scroll',closeDial,{passive:true});

// ═══════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════
initDB().then(function(){
  return loadAll();
}).then(function(){
  setTodayDates();
  render();
  setTimeout(function(){document.getElementById('app-loader').style.display='none';},600);
}).catch(function(e){
  document.getElementById('app-loader').innerHTML='<div style="color:#e05c6a;padding:2rem;text-align:center">خطأ في تحميل قاعدة البيانات<br><small>'+e+'</small></div>';
});
</script>
